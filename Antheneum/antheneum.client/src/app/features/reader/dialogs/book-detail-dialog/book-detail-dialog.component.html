<h2 mat-dialog-title>{{ book.title }}</h2>
<p class="book-meta">{{ book.authors }}</p>

<mat-dialog-content>
  <mat-progress-bar *ngIf="isLoading()" mode="indeterminate"></mat-progress-bar>

  <ng-container *ngIf="!isLoading()">
    <ng-container *ngIf="branchSummaries().length > 0; else noAvailability">
      <div *ngFor="let branch of branchSummaries()" class="branch-row">
        <div class="branch-info">
          <mat-icon class="branch-icon">location_on</mat-icon>
          <span class="branch-name">{{ branch.branchName }}</span>
          <span
            class="availability-badge"
            [class.availability-badge--available]="branch.availableCount > 0"
            [class.availability-badge--none]="branch.availableCount === 0"
          >
            {{ branch.availableCount }} / {{ branch.totalCount }} available
          </span>
        </div>

        <div class="branch-action">
          <!-- Reader with active subscription and copies available -->
          <button
            *ngIf="isReader && isSubscribed && branch.availableCount > 0"
            mat-flat-button
            color="primary"
            (click)="borrowFromBranch(branch.branchName)"
          >
            Borrow
          </button>

          <!-- Reader with subscription but no copies available here -->
          <span
            *ngIf="isReader && isSubscribed && branch.availableCount === 0"
            class="unavailable-label"
          >
            Unavailable
          </span>

          <!-- Reader without subscription -->
          <a
            *ngIf="isReader && !isSubscribed"
            mat-stroked-button
            routerLink="/reader/checkout"
            (click)="dialogRef.close()"
          >
            Subscribe to borrow
          </a>

          <!-- Guest -->
          <a *ngIf="!isReader" mat-stroked-button routerLink="/auth" (click)="dialogRef.close()">
            Sign in to borrow
          </a>
        </div>
      </div>
    </ng-container>

    <ng-template #noAvailability>
      <div class="empty-state">
        <mat-icon>inventory_2</mat-icon>
        <p>No copies registered in any branch.</p>
      </div>
    </ng-template>
  </ng-container>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="dialogRef.close()">Close</button>
</mat-dialog-actions>
