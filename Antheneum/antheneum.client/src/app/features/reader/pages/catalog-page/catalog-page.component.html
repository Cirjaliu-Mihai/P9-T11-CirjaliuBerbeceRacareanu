<div class="catalog-page">
  <div class="catalog-layout">
    <aside class="filters-panel panel">
      <div class="filters-head">
        <p class="kicker">Filters</p>
        <button mat-stroked-button type="button" (click)="clearFilters()">Clear all</button>
      </div>

      <section class="filter-group">
        <h3>Author</h3>
        <div class="filter-list">
          <button
            mat-stroked-button
            type="button"
            class="filter-option"
            [class.is-active]="selectedAuthor === ''"
            (click)="selectAuthor('')"
          >
            Any author
          </button>

          <button
            mat-stroked-button
            type="button"
            class="filter-option"
            *ngFor="let author of authorOptions"
            [class.is-active]="selectedAuthor === author"
            (click)="selectAuthor(author)"
          >
            {{ author }}
          </button>
        </div>
      </section>

      <section class="filter-group">
        <h3>Publisher</h3>
        <div class="filter-list">
          <button
            mat-stroked-button
            type="button"
            class="filter-option"
            [class.is-active]="selectedPublisher === ''"
            (click)="selectPublisher('')"
          >
            Any publisher
          </button>

          <button
            mat-stroked-button
            type="button"
            class="filter-option"
            *ngFor="let publisher of publisherOptions"
            [class.is-active]="selectedPublisher === publisher"
            (click)="selectPublisher(publisher)"
          >
            {{ publisher }}
          </button>
        </div>
      </section>
    </aside>

    <section class="catalog-main">
      <div class="catalog-header">
        <div>
          <p class="kicker">Public Catalog</p>
          <h2>Browse Books</h2>
        </div>
      </div>

      <mat-form-field class="search-field" appearance="outline">
        <mat-label>Search books</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange($event)" />
      </mat-form-field>

      <mat-progress-bar
        *ngIf="isLoading()"
        mode="indeterminate"
        class="catalog-progress"
      ></mat-progress-bar>

      <div class="catalog-grid" *ngIf="books().length > 0; else emptyState">
        <mat-card class="book-card" *ngFor="let book of books()" (click)="openBook(book)" role="button">
          <img *ngIf="book.imgUrl" [src]="book.imgUrl" [alt]="book.title" class="book-cover" />
          <div *ngIf="!book.imgUrl" class="cover-placeholder">
            <mat-icon>menu_book</mat-icon>
          </div>
          <mat-card-content>
            <p class="book-title">{{ book.title }}</p>
            <p class="book-meta">{{ book.authors || 'Unknown author' }}</p>
            <p class="book-meta small">{{ book.publisher }}</p>
          </mat-card-content>
        </mat-card>
      </div>

      <ng-template #emptyState>
        <div class="empty-state" *ngIf="!isLoading()">
          <mat-icon>search_off</mat-icon>
          <p>No books found</p>
        </div>
      </ng-template>

      <div class="pagination-bar" *ngIf="totalPages > 1">
        <button mat-icon-button [disabled]="page() <= 1" (click)="loadPage(page() - 1)">
          <mat-icon>chevron_left</mat-icon>
        </button>
        <span>Page {{ page() }} of {{ totalPages }}</span>
        <button mat-icon-button [disabled]="page() >= totalPages" (click)="loadPage(page() + 1)">
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </section>
  </div>
</div>
