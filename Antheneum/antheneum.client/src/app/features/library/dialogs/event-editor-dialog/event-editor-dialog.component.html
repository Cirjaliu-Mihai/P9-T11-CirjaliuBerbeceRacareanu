<h1 mat-dialog-title>{{ data ? 'Edit Event' : 'Create Event' }}</h1>

<mat-dialog-content class="editor-content">
  <form [formGroup]="form" class="editor-layout">
    <div class="field-grid">
      <mat-form-field appearance="outline">
        <mat-label>Title</mat-label>
        <input matInput formControlName="title" />
        <mat-error *ngIf="form.get('title')?.hasError('required')">Required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" rows="3"></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Branch</mat-label>
        <mat-select formControlName="branchId">
          <mat-option *ngFor="let branch of branches" [value]="branch.branchId">
            {{ branch.name }}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="form.get('branchId')?.hasError('required')">Required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Start Date</mat-label>
        <input matInput [matDatepicker]="startPicker" [min]="!data ? minStartDate : null" formControlName="startDate" readonly />
        <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
        <mat-error *ngIf="form.get('startDate')?.hasError('required')">Required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Start Time</mat-label>
        <input matInput type="time" formControlName="startTime" />
        <mat-error *ngIf="form.get('startTime')?.hasError('required')">Required</mat-error>
        <mat-error *ngIf="form.hasError('startDateInPast')">Start date/time cannot be in the past</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>End Date</mat-label>
        <input matInput [matDatepicker]="endPicker" [min]="minEndDate" formControlName="endDate" readonly />
        <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
        <mat-error *ngIf="form.get('endDate')?.hasError('required')">Required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>End Time</mat-label>
        <input matInput type="time" formControlName="endTime" />
        <mat-error *ngIf="form.get('endTime')?.hasError('required')">Required</mat-error>
        <mat-error *ngIf="form.hasError('dateRangeInvalid')">End date/time must be after start date/time</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Max Seats</mat-label>
        <input matInput type="number" formControlName="maxSeats" />
        <mat-error *ngIf="form.get('maxSeats')?.hasError('required')">Required</mat-error>
      </mat-form-field>
    </div>

    <div class="cover-editor">
      <label for="event-cover-input">
        <div *ngIf="displayImageUrl; else placeholder" class="cover-image">
          <img [src]="displayImageUrl" alt="Event cover" />
        </div>
        <ng-template #placeholder>
          <div class="cover-placeholder">
            <mat-icon>image</mat-icon>
            <p>Click to add image</p>
          </div>
        </ng-template>
      </label>
      <input id="event-cover-input" type="file" (change)="onFileSelected($event)" style="display: none" accept="image/*" />

      <div class="cover-actions">
        <button mat-button class="footer-btn footer-btn--quiet" (click)="dialogRef.close()">Cancel</button>
        <button mat-raised-button color="primary" class="footer-btn" [disabled]="!form.valid || submitting" (click)="onSubmit()">
          {{ submitting ? 'Saving...' : (data ? 'Update' : 'Create') }}
        </button>
      </div>
    </div>
  </form>
</mat-dialog-content>
