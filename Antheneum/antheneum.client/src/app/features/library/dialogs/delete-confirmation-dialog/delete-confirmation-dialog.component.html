<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>Are you sure?</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="dialogRef.close(false)">Cancel</button>
  <button mat-flat-button type="button" color="warn" (click)="dialogRef.close(true)">
    {{ data.confirmLabel }}
  </button>
</mat-dialog-actions>
