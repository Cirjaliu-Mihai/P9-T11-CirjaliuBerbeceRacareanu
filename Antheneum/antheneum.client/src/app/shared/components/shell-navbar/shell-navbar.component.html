<div class="app-navbar">
    <a class="brand-mark" [routerLink]="homePath" aria-label="Antheneum home">
        <span class="brand-mark__glyph">A</span>
        <span class="brand-mark__copy">
            <span class="brand-mark__eyebrow">{{ workspaceEyebrow }}</span>
            <strong>{{ workspaceTitle }}</strong>
        </span>
    </a>

    <nav class="top-nav" aria-label="Dashboard sections">
        <a
            *ngFor="let section of sections"
            class="nav-chip"
            [routerLink]="section.path"
            routerLinkActive="is-active"
        >
            <span class="nav-chip__label">{{ section.label }}</span>
        </a>
    </nav>

    <div class="account-cluster" aria-label="Current session">
        <div class="account-cluster__profile">
            <mat-icon>person</mat-icon>
            <span class="account-cluster__label">{{ username || 'Administrator' }}</span>
        </div>
        <button class="account-cluster__signout" mat-stroked-button type="button" (click)="onSignOut()">
            Sign out
        </button>
    </div>
</div>
