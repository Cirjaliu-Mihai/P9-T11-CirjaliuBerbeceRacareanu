<div *ngIf="auth.isAuthenticated()" class="bg-layer">
  <app-three-background></app-three-background>
</div>

<ng-container *ngIf="auth.isAuthenticated(); else authOutlet">
  <div class="app-shell">
    <main class="workspace">
      <mat-progress-bar *ngIf="store.isLoading$ | async" mode="indeterminate"></mat-progress-bar>

      <div class="router-slot">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</ng-container>

<ng-template #authOutlet>
  <router-outlet></router-outlet>
</ng-template>
